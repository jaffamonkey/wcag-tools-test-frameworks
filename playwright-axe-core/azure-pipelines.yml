# azure-pipelines.yml
# Playwright + axe-core: install, run tests, publish reports/artifacts
#
# Notes:
# - Set TEST_USERNAME / TEST_PASSWORD as secret variables in the pipeline or a variable group.
# - Reports are published even if the test job fails (condition: always()).

trigger:
  - main

pr:
  - main

pool:
  vmImage: ubuntu-latest

variables:
  NODE_VERSION: "20.x"
  # Run headless in CI by default
  HEADLESS: "true"

steps:
  - checkout: self
    clean: "true"

  - task: NodeTool@0
    displayName: "Use Node $(NODE_VERSION)"
    inputs:
      versionSpec: "$(NODE_VERSION)"

  # Optional: cache npm to speed up installs
  - task: Cache@2
    displayName: "Cache npm"
    inputs:
      key: 'npm | "$(Agent.OS)" | package-lock.json'
      restoreKeys: |
        npm | "$(Agent.OS)"
      path: $(Pipeline.Workspace)/.npm

  - script: |
      npm config set cache "$(Pipeline.Workspace)/.npm" --global
      npm ci
    displayName: "Install dependencies"

  - script: |
      npx playwright install --with-deps
    displayName: "Install Playwright browsers"

  # Run tests (will fail the job if there are failing assertions / a11y failures)
  - script: |
      npx playwright test
    displayName: "Run Playwright tests"
    env:
      HEADLESS: "$(HEADLESS)"
      TEST_USERNAME: "$(TEST_USERNAME)"
      TEST_PASSWORD: "$(TEST_PASSWORD)"

  # --- Publish artifacts even if tests fail ---
  - task: PublishPipelineArtifact@1
    displayName: "Publish Playwright HTML report"
    condition: always()
    inputs:
      targetPath: "playwright-report"
      artifact: "playwright-report"
      publishLocation: "pipeline"

  - task: PublishPipelineArtifact@1
    displayName: "Publish a11y reports"
    condition: always()
    inputs:
      targetPath: "a11y-reports"
      artifact: "a11y-reports"
      publishLocation: "pipeline"

  - task: PublishPipelineArtifact@1
    displayName: "Publish test-results folder (raw)"
    condition: always()
    inputs:
      targetPath: "test-results"
      artifact: "test-results"
      publishLocation: "pipeline"
