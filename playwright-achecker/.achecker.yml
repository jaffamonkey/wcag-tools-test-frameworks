# .achecker.yml

# 1. Specify the rule archive that includes WCAG 2.2 (v7.3+)
# 'latest' will pull the most recent stable ruleset
ruleArchive: latest

# 2. Set the policy to IBM_Accessibility
# This policy automatically includes WCAG 2.2 A/AA criteria
policies:
  - WCAG_2_2

# 3. Fail the build if any violations are found (optional)
failLevels:
  - violation

# 4. Output configuration
reportLevels:
  - violation
  - potentialviolation
  # - recommendation
outputFormat:
  - json
outputFolder: accessibility-reports
